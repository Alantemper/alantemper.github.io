<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Msplay'website</title>
    <style>
        body {
            background: url('Wings of Liberty.jpg') no-repeat center center fixed;
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            color: white; 
            margin: 0;
            font-family: Arial, sans-serif;
            /* 为确保手机上的字体足够大 */
            font-size: 18px;
        }
        .container {
            max-width: 100%; /* 适应屏幕宽度 */
            margin: auto;
            padding: 20px;
            /* 增加内边距，使文字与屏幕边缘保持一定距离 */
            padding-top: 40px;
            padding-bottom: 60px;
        }
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            color: #ccc;
            text-align: center;
            padding: 10px 0;
        }
        a {
            color: #00bfff;
            text-decoration: none;
        }
        h1, p {
            color: #fff;
            /* 增加行高，使得文字间有一定间隔 */
            line-height: 1.6;
        }
        
        /* 针对手机屏幕的媒体查询 */
        @media only screen and (max-width: 768px) {
            body {
                /* 再次放大字体大小 */
                font-size: 22px;
            }
            .container {
                /* 增加更多的内边距 */
                padding-top: 60px;
                padding-bottom: 80px;
            }
        }
    </style>
</head>
